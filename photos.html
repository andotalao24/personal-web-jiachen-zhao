    <main class="container">
      <h2>Tadao Ando — A Small Photo Space</h2>
      <p class="muted-note">
        Hover over a photo to see its description. Images via Wikimedia Commons.
      </p>

      <div class="gallery">
        <figure class="photo-card">
          <img
            src="https://commons.wikimedia.org/wiki/Special:FilePath/Ibaraki_Kasugaoka_Church_20080914.jpg?width=800"
            alt="Interior of the Church of the Light in Ibaraki, Osaka."
            loading="lazy"
          />
          <figcaption class="photo-caption">
            <strong>Church of the Light</strong> · Ibaraki, Osaka · 1989. A cruciform slit in the
            concrete wall lets daylight pour through, turning sunlight itself into the altar.
          </figcaption>
        </figure>

        <figure class="photo-card">
          <img
            src="https://commons.wikimedia.org/wiki/Special:FilePath/Church_on_the_Water_Exterior1.jpg?width=800"
            alt="Exterior view of the Church on the Water in Tomamu, Hokkaido."
            loading="lazy"
          />
          <figcaption class="photo-caption">
            <strong>Church on the Water</strong> · Tomamu, Hokkaido · 1988. A glass wall slides open
            onto a man-made pond — the cross floats above the surface of the water.
          </figcaption>
        </figure>

        <figure class="photo-card">
          <img
            src="https://commons.wikimedia.org/wiki/Special:FilePath/Chichu_art_museum02s2560.jpg?width=800"
            alt="Exterior of the Chichu Art Museum on Naoshima Island."
            loading="lazy"
          />
          <figcaption class="photo-caption">
            <strong>Chichu Art Museum</strong> · Naoshima · 2004. Built mostly underground to avoid
            disturbing the island skyline; light wells carry sunlight down to galleries holding
            Monet, Turrell, and De Maria.
          </figcaption>
        </figure>

        <figure class="photo-card">
          <img
            src="https://commons.wikimedia.org/wiki/Special:FilePath/Azuma_house.JPG?width=800"
            alt="Row House in Sumiyoshi (Azuma House), a narrow concrete townhouse in Osaka."
            loading="lazy"
          />
          <figcaption class="photo-caption">
            <strong>Row House in Sumiyoshi</strong> · Osaka · 1976. Ando's breakthrough early work —
            a slot of concrete inserted into a row of wooden houses, organised around an open
            courtyard.
          </figcaption>
        </figure>

        <figure class="photo-card">
          <img
            src="https://commons.wikimedia.org/wiki/Special:FilePath/Awaji_yumebutai19s3.jpg?width=800"
            alt="Stepped gardens of Awaji Yumebutai on Awaji Island, Japan."
            loading="lazy"
          />
          <figcaption class="photo-caption">
            <strong>Awaji Yumebutai</strong> · Awaji Island · 2000. A landscape of stepped terraces
            built on a hillside scarred by quarrying, planted with one hundred thousand flowers.
          </figcaption>
        </figure>

        <figure class="photo-card">
          <img
            src="https://commons.wikimedia.org/wiki/Special:FilePath/21_21_DESIGN_SIGHT.jpg?width=800"
            alt="21_21 Design Sight museum in Tokyo Midtown."
            loading="lazy"
          />
          <figcaption class="photo-caption">
            <strong>21_21 Design Sight</strong> · Tokyo · 2007. Two folded steel-plate roofs hover
            over a sunken gallery — a collaboration with designer Issey Miyake.
          </figcaption>
        </figure>
